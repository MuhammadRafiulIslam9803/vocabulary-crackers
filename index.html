<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Vocabulary Cracker</title>
        <!-- desi ui  -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
            type="text/css" />
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- css -->
        <link rel="stylesheet" href="style/style.css">
        <!-- font awesome -->
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
            integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        <!-- google fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet">
    </head>
    <body>
        <header
            class="flex justify-between items-center bg-blue-100 p-4 fixed top-0 left-0 w-full h-16 shadow z-50">
            <h2 class="text-2xl font-semibold flex items-center">
                <span>Vocabulary </span>
                <img src="assets/logo.png" alt>
                <span>Cracker</span>
            </h2>
            <div class="flex flex-col flex-wrap gap-3 md:flex-row">
                <button class="btn btn-outline btn-accent  shadow-2xl"><i
                        class="fa-solid fa-circle-question"></i> FAQ</button>
                <button class="btn btn-outline btn-accent shadow-2xl"><i
                        class="fa-solid fa-book-open-reader"></i>Learn</button>
                <button class="btn btn-outline btn-accent shadow-2xl"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</button>
            </div>
        </header>
        <section
            class="flex w-11/12 flex-col md:flex-row mx-auto gap-36 justify-center items-center p-2">
            <div class="flex flex-col flex-1 mt-40">
                <h1 class="text-3xl font-semibold"><span
                        class="text-blue-600">English</span> is Easy !!</h1>
                <p class="text-lg font-medium mt-5">Start your language learning
                    journey today! Whether you're just getting started or aiming
                    to enhance your skills, our interactive lessons are designed
                    to take your learning to the next level .</p>
            </div>
            <div class="flex-1">
                <img src="assets/hero-student.png" alt>
            </div>
        </section>
        <!-- vocabulary larning btn container -->
        <section class="mt-32">
            <h1 class="text-3xl font-semibold text-center"><span
                    class="text-blue-600">Let's</span>  Learn Vocabularies</h1>
            <div id="vocabulary-container-btn"  class="flex justify-center flex-wrap items-center gap-5 mt-10 mb-10">
            </div>
        </section>

        <!-- js connection -->
         <script src="script/index.js"></script>
    </body>
</html>
